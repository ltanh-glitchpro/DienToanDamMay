<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<title>Xử lý sửa địa điểm - Bản đồ địa điểm An Giang</title>
</head>

<body>
	<div class="container">
		<div id="navbar"></div>
		<div class="card mt-3">
			<div class="card-header">Xử lý sửa địa điểm</div>
			<div class="card-body">
				<div id="HienThi"></div>
			</div>
		</div>
		<div id="footer"></div>
	</div>
	<script>
		$(function(){
			$('#navbar').load('inc/navbar.html');
			$('#footer').load('inc/footer.html');
		});
	</script>
	<script type="module" src="inc/config.js"></script>
	<script type="module">
		// Cập nhật địa điểm vào Firestore
		import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";
		const db = getFirestore();
		
		// Lấy dữ liệu từ localStorage
		var idDiaDiem = localStorage.getItem('idDiaDiem');
		var maDiaDiem = localStorage.getItem('maDiaDiem');
		var maLoai = localStorage.getItem('maLoai').trim(); // Trim để xóa khoảng trắng
		var tenDiaDiem = localStorage.getItem('tenDiaDiem');
		var viDo = localStorage.getItem('viDo');
		var kinhDo = localStorage.getItem('kinhDo');
		var diaChi = localStorage.getItem('diaChi');
		var ghiChu = localStorage.getItem('ghiChu');
		
		try {
			// Kiểm tra dữ liệu hợp lệ
			if (!idDiaDiem || !maDiaDiem || !maLoai || !tenDiaDiem || !viDo || !kinhDo || !diaChi) {
				throw new Error('Dữ liệu không hợp lệ. Vui lòng điền đầy đủ các trường bắt buộc.');
			}
			
			// Chuyển đổi tọa độ sang số
			var viDoNum = parseFloat(viDo);
			var kinhDoNum = parseFloat(kinhDo);
			
			if (isNaN(viDoNum) || isNaN(kinhDoNum)) {
				throw new Error('Vĩ độ và Kinh độ phải là số.');
			}
			
			// Cập nhật với ToaDo object (khớp với cách đọc trong diadiem.html)
			await updateDoc(doc(db, "diadiem", idDiaDiem), {
				MaDiaDiem: maDiaDiem,
				MaLoai: maLoai.toString(),
				TenDiaDiem: tenDiaDiem,
				ToaDo: {
					latitude: viDoNum,
					longitude: kinhDoNum
				},
				DiaChi: diaChi,
				GhiChu: ghiChu || ''
			});
			
			// Xóa dữ liệu localStorage
			localStorage.removeItem('idDiaDiem');
			localStorage.removeItem('maDiaDiem');
			localStorage.removeItem('maLoai');
			localStorage.removeItem('tenDiaDiem');
			localStorage.removeItem('viDo');
			localStorage.removeItem('kinhDo');
			localStorage.removeItem('diaChi');
			localStorage.removeItem('ghiChu');
			
			// Hiển thị thông báo thành công
			var output = '<div class="alert alert-success" role="alert">';
			output += '<h4 class="alert-heading">Cập nhật thành công!</h4>';
			output += '<p>Địa điểm <strong>' + tenDiaDiem + '</strong> đã được cập nhật.</p>';
			output += '<hr>';
			output += '<p class="mb-0"><a href="diadiem.html" class="btn btn-primary">Quay lại danh sách</a></p>';
			output += '</div>';
			$('#HienThi').html(output);
			
			// Chuyển hướng sau 2 giây
			setTimeout(function(){
				location.href = 'diadiem.html';
			}, 2000);
			
		} catch (error) {
			console.error("Lỗi:", error);
			var output = '<div class="alert alert-danger" role="alert">';
			output += '<h4 class="alert-heading">Lỗi cập nhật địa điểm!</h4>';
			output += '<p>' + error.message + '</p>';
			output += '<hr>';
			output += '<p class="mb-0"><a href="diadiem_sua.html" class="btn btn-secondary">Quay lại biểu mẫu</a></p>';
			output += '</div>';
			$('#HienThi').html(output);
		}
	</script>
</body>

</html>
