<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<title>Sửa địa điểm - Bản đồ địa điểm An Giang</title>
</head>

<body>
	<div class="container">
		<div id="navbar"></div>
		<div class="card mt-3">
			<div class="card-header">Sửa địa điểm</div>
			<div class="card-body">
				<form action="diadiem_sua_xuly.html" method="get" class="needs-validation" novalidate>
					<input type="text" id="ID" name="ID" hidden />
					
					<div class="mb-3">
						<label for="MaDiaDiem" class="form-label">Mã địa điểm</label>
						<input type="text" class="form-control" id="MaDiaDiem" required />
					</div>
					<div class="mb-3">
						<label for="MaLoai" class="form-label">Loại</label>
						<select class="form-select" id="MaLoai" required>
							<option value="">-- Đang tải... --</option>
						</select>
					</div>
					<div class="mb-3">
						<label for="TenDiaDiem" class="form-label">Tên địa điểm</label>
						<input type="text" class="form-control" id="TenDiaDiem" required />
					</div>
					<div class="row">
						<div class="col-md-6 mb-3">
							<label for="ViDo" class="form-label">Vĩ độ</label>
							<input type="number" step="any" class="form-control" id="ViDo" required />
						</div>
						<div class="col-md-6 mb-3">
							<label for="KinhDo" class="form-label">Kinh độ</label>
							<input type="number" step="any" class="form-control" id="KinhDo" required />
						</div>
					</div>
					<div class="mb-3">
						<label for="DiaChi" class="form-label">Địa chỉ</label>
						<input type="text" class="form-control" id="DiaChi" required />
					</div>
					<div class="mb-3">
						<label for="GhiChu" class="form-label">Ghi chú về địa điểm</label>
						<textarea class="form-control" id="GhiChu"></textarea>
					</div>
					
					<button type="submit" class="btn btn-primary">Cập nhật</button>
					<a href="diadiem.html" class="btn btn-secondary">Hủy bỏ</a>
				</form>
			</div>
		</div>
		<div id="footer"></div>
	</div>
	
	<script>
		$(function(){
			$('#navbar').load('inc/navbar.html');
			$('#footer').load('inc/footer.html');
		});
	</script>
	
	<script type="module" src="inc/config.js"></script>
	
	<script type="module">
		import { getFirestore, doc, collection, getDocs, getDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
		const db = getFirestore();
		
		// 1. Load danh sách Loại vào Dropdown
		// SỬA: Value phải là d.data().MaLoai để khớp với dữ liệu lưu trữ
		const loaiDiaDiem = await getDocs(collection(db, 'loaidiadiem'));
		var output = '<option value="">-- Chọn --</option>';
		loaiDiaDiem.forEach((d) => {
			output += `<option value="${d.data().MaLoai}">${d.data().TenLoai}</option>`;
		});
		$('#MaLoai').html(output);
		
		// 2. Lấy dữ liệu cũ đổ vào Form
		const urlParams = new URLSearchParams(window.location.search);
		const docID = urlParams.get('id');
		
		if (docID) {
			const docRef = doc(db, 'diadiem', docID);
			const docSnap = await getDoc(docRef);
			
			if (docSnap.exists()) {
				const data = docSnap.data();
				
				// Đổ dữ liệu
				$('#ID').val(docSnap.id);
				$('#MaDiaDiem').val(data.MaDiaDiem);
				$('#MaLoai').val(data.MaLoai); // Tự động chọn option đúng vì value đã khớp
				$('#TenDiaDiem').val(data.TenDiaDiem);
				$('#DiaChi').val(data.DiaChi);
				$('#GhiChu').val(data.GhiChu);

				// Tách GeoPoint
				if (data.ToaDo) {
					$('#ViDo').val(data.ToaDo.latitude);
					$('#KinhDo').val(data.ToaDo.longitude);
				}
			} else {
				alert('Không tìm thấy dữ liệu!');
				location.href = 'diadiem.html';
			}
		}

		// 3. Xử lý lưu vào LocalStorage khi submit
		(function() {
			'use strict';
			const forms = document.querySelectorAll('.needs-validation');
			Array.from(forms).forEach(form => {
				form.addEventListener('submit', event => {
					if (!form.checkValidity()) {
						event.preventDefault();
						event.stopPropagation();
					} else {
						// SỬA: Tên biến phải khớp với file 'diadiem_sua_xuly.html'
						localStorage.setItem('idDiaDiem', $('#ID').val()); // File xử lý cần 'idDiaDiem', không phải 'docID'
						localStorage.setItem('maDiaDiem', $('#MaDiaDiem').val());
						localStorage.setItem('maLoai', $('#MaLoai').val());
						localStorage.setItem('tenDiaDiem', $('#TenDiaDiem').val());
						localStorage.setItem('viDo', $('#ViDo').val());
						localStorage.setItem('kinhDo', $('#KinhDo').val());
						localStorage.setItem('diaChi', $('#DiaChi').val());
						localStorage.setItem('ghiChu', $('#GhiChu').val());
					}
					form.classList.add('was-validated');
				}, false);
			});
		})();
	</script>
</body>
</html>
