<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<title>Địa điểm - Bản đồ địa điểm An Giang</title>
</head>

<body>
	<div class="container">
		<div id="navbar"></div>
		<div class="card mt-3">
			<div class="card-header">Địa điểm</div>
			<div class="card-body">
				<p>
					<a href="diadiem_them.html" class="btn btn-success">Thêm mới</a>
				</p>
				<table class="table table-bordered table-hover table-sm mb-0">
					<thead>
						<tr>
							<th width="5%">#</th>
							<th width="15%">Loại</th>
							<th width="40%">Thông tin địa điểm</th>
							<th width="25%">Tọa độ</th>
							<th width="5%">Sửa</th>
							<th width="5%">Xóa</th>
						</tr>
					</thead>
					<tbody id="HienThi"></tbody>
				</table>
			</div>
		</div>
		<div id="footer"></div>
	</div>
	<script>
		$(function(){
			$('#navbar').load('inc/navbar.html');
			$('#footer').load('inc/footer.html');
		});
	</script>
	<script type="module" src="inc/config.js"></script>
	<script type="module">
		// 1. Import đầy đủ các hàm cần thiết
		import { getFirestore, collection, getDocs, getDoc, doc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
		const db = getFirestore();

		async function getDanhSachDiaDiem() {
			try {
				const querySnapshot = await getDocs(collection(db, 'diadiem'));
				const promises = querySnapshot.docs.map(docSnap => getRefData(docSnap));
				return Promise.all(promises);
			} catch (error) {
				console.error("Lỗi tải danh sách:", error);
				return [];
			}
		}
		
		async function getRefData(docSnap) {
			var diaDiem = docSnap.data();
			diaDiem.id = docSnap.id;
			
			// Xử lý tham chiếu Loại Địa Điểm
			try {
				if (diaDiem.MaLoai) {
					// Chuyển MaLoai sang string và trim để khớp với ID
					const maLoaiString = String(diaDiem.MaLoai).trim();
					const loaiRef = doc(db, 'loaidiadiem', maLoaiString);
					const loaiSnapshot = await getDoc(loaiRef);
					
					if (loaiSnapshot.exists()) {
						diaDiem.Loai = loaiSnapshot.data();
					} else {
						// Nếu không tìm thấy, log ra console để debug
						console.warn("Không tìm thấy loại với ID:", maLoaiString);
						diaDiem.Loai = { TenLoai: 'Loại không tồn tại' };
					}
				} else {
					diaDiem.Loai = { TenLoai: 'Chưa phân loại' };
				}
			} catch (error) {
				console.error("Lỗi khi lấy loại:", error);
				diaDiem.Loai = { TenLoai: 'Lỗi tải loại' };
			}
			return diaDiem;
		}
		
		await getDanhSachDiaDiem().then(results => {
            var output = '';
            results.forEach((d) => {
                const tenLoai = d.Loai ? d.Loai.TenLoai : '...';

                let toaDoHienThi = '';
                if (d.ToaDo && d.ToaDo.latitude && d.ToaDo.longitude) {
                    toaDoHienThi = '[' + d.ToaDo.latitude + ']<br>[' + d.ToaDo.longitude + ']';
                } else {
                    toaDoHienThi = '<span class="text-danger">-</span>';
                }

                output += '<tr>';
                    output += '<td class="align-middle">' + d.MaDiaDiem + '</td>';
                    output += '<td class="align-middle">' + tenLoai + '</td>';
                    output += '<td class="align-middle"><b>' + d.TenDiaDiem + '</b><br><small class="text-muted">Địa chỉ: ' + d.DiaChi + '</small></td>';
                    output += '<td class="align-middle font-monospace">' + toaDoHienThi + '</td>';
                    output += '<td class="align-middle text-center"><a href="diadiem_sua.html?id=' + d.id + '">Sửa</a></td>';
                    output += '<td class="align-middle text-center"><a onclick="return confirm(\'Bạn có muốn xóa địa điểm ' + d.TenDiaDiem + ' không?\')" href="diadiem_xoa.html?id=' + d.id + '">Xóa</a></td>';
                output += '</tr>';
            });
            $('#HienThi').html(output);
        });
	</script>
</body>

</html>
